<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Sway</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0c14;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a28;
      border: 1px solid #252538;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 24px rgba(124,58,237,0.4);
      font-size: 24px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p.sub { color: #64748b; font-size: 13px; margin-bottom: 28px; }
    input {
      width: 100%;
      background: #111118;
      border: 1px solid #252538;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: default; }
    .msg { font-size: 13px; margin-top: 12px; padding: 10px 12px; border-radius: 8px; text-align: left; }
    .msg.error   { background: rgba(239,68,68,0.1);  color: #f87171; }
    .msg.success { background: rgba(52,211,153,0.1); color: #6ee7b7; }
    .footer { color: #334155; font-size: 11px; margin-top: 28px; }
    #loading-state { color: #64748b; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑</div>
    <h1>Set New Password</h1>
    <p class="sub" id="subtitle">Choose a new password for your account.</p>

    <div id="loading-state" style="display:none">Verifying reset link…</div>

    <div id="form-state">
      <input type="password" id="password" placeholder="New password (min 8 characters)" autocomplete="new-password"/>
      <input type="password" id="confirm" placeholder="Confirm new password" autocomplete="new-password"/>
      <button id="btn" onclick="doReset()">Update Password</button>
      <div id="msg"></div>
    </div>

    <div id="done-state" style="display:none">
      <div class="msg success">✅ Password updated! You can close this tab and sign in to Sway.</div>
    </div>

    <p class="footer">Sway · by U Brands</p>
  </div>

  <script>
    const { createClient } = window.supabase;
    const client = createClient(
      'https://oijvorghctyucdhnkmtt.supabase.co',
      'sb_publishable_cajehuE3Kz7OjS09R4P1eA_DCb88iUm'
    );

    // Supabase puts the session tokens in the URL hash after redirect
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('form-state').style.display = 'none';

    client.auth.onAuthStateChange((event, session) => {
      document.getElementById('loading-state').style.display = 'none';
      if (event === 'PASSWORD_RECOVERY' || (session && event === 'SIGNED_IN')) {
        document.getElementById('form-state').style.display = 'block';
      } else if (!session) {
        document.getElementById('subtitle').textContent = 'This reset link has expired or is invalid. Please request a new one from the app.';
      }
    });

    async function doReset() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const msgEl    = document.getElementById('msg');
      const btn      = document.getElementById('btn');

      msgEl.className = 'msg';
      msgEl.textContent = '';

      if (password.length < 8) {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (password !== confirm) {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Passwords don\'t match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await client.auth.updateUser({ password });
      if (error) {
        msgEl.className = 'msg error';
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('done-state').style.display = 'block';
      }
    }
  </script>
</body>
</html>
